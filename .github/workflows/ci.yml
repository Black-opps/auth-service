name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # ← Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # ← Updated from v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff   # Add Ruff for linting

      - name: Lint with Ruff
        run: ruff check . # Optional but good

      - name: Run tests
        run: pytest --cov=src tests/ # Remove || true once tests exist

      - name: Upload coverage
        uses: codecov/codecov-action@v4 # Update if needed

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4 # ← Updated

      - name: Build Docker image
        run: docker build -t auth-service .

      - name: Test Docker image
        run: docker run --rm auth-service python -c "import src.main; print('OK')"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # ← v3 is fine, or v4 if available
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker tag auth-service ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
