name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          pip install ruff isort bandit mypy pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Check imports
        run: isort --check-only --profile black .

      - name: Security scan
        run: bandit -r src/

      - name: Type checking
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/auth_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
        run: |
          pytest --cov=src tests/ \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build auth-service Docker image
        run: |
          docker build -t auth-service:ci .

      - name: Run auth-service container
        run: |
          docker run -d --name auth-service \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/auth_test \
            -e REDIS_URL=redis://localhost:6379 \
            -e SECRET_KEY=test-secret-key \
            -e ALGORITHM=HS256 \
            -p 8000:8000 auth-service:ci

      - name: Wait for service to be healthy
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep '"status":"degraded"\|"status":"ok"'; then
              echo "Service is up"
              break
            fi
            echo "Waiting for service..."
            sleep 2
          done

      - name: Run integration tests
        run: |
          pytest tests/integration/ --base-url=http://localhost:8000

      - name: Stop auth-service container
        run: docker stop auth-service && docker rm auth-service

  docker:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
            ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
